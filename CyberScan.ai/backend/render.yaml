services:
  - type: web
    name: cyberscan-ai-backend
    runtime: python
    rootDir: CyberScan.ai/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./cyberscan.db
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: FROM_EMAIL
        value: creaftercode@gmail.com
      - key: FRONTEND_URL
        value: https://cyberscan-ai-app.netlify.app
      - key: CORS_ORIGINS
        value: '["https://cyberscan-ai-app.netlify.app"]'
      - key: FREE_SCANS_PER_DAY
        value: 999
      - key: PRO_SCANS_PER_DAY
        value: 999
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
