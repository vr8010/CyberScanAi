version: '3.9'

# ── SecureScout — Full Stack Docker Compose ───────────────────────────────────
# Services: postgres, redis, backend (FastAPI), frontend (React), nginx (proxy)

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: securescout_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       securescout
      POSTGRES_USER:     securescout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securescout_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securescout"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securescout_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: securescout_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - securescout_net

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securescout_api
    restart: unless-stopped
    environment:
      DATABASE_URL:       postgresql+asyncpg://securescout:${POSTGRES_PASSWORD:-securescout_dev_password}@postgres:5432/securescout
      DATABASE_URL_SYNC:  postgresql://securescout:${POSTGRES_PASSWORD:-securescout_dev_password}@postgres:5432/securescout
      REDIS_URL:          redis://redis:6379/0
      SECRET_KEY:         ${SECRET_KEY:-changeme_use_strong_key_in_production}
      OPENAI_API_KEY:     ${OPENAI_API_KEY:-}
      OPENAI_MODEL:       ${OPENAI_MODEL:-gpt-3.5-turbo}
      RAZORPAY_KEY_ID:    ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_PLAN_ID_PRO: ${RAZORPAY_PLAN_ID_PRO:-}
      SMTP_HOST:          ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT:          ${SMTP_PORT:-587}
      SMTP_USER:          ${SMTP_USER:-}
      SMTP_PASSWORD:      ${SMTP_PASSWORD:-}
      FROM_EMAIL:         ${FROM_EMAIL:-noreply@securescout.io}
      FRONTEND_URL:       ${FRONTEND_URL:-http://localhost}
      ENVIRONMENT:        ${ENVIRONMENT:-development}
      CORS_ORIGINS:       '["http://localhost", "http://localhost:3000", "http://localhost:80"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app  # Remove in production for immutable builds
    ports:
      - "8000:8000"
    networks:
      - securescout_net

  # ── Frontend (React + Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: securescout_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - securescout_net

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: securescout_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro       # Mount SSL certs here
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - securescout_net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  nginx_logs:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  securescout_net:
    driver: bridge
